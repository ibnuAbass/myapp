publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  fl_chart: ^1.2.0
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  permission_handler: ^12.0.0+1
  equatable: ^2.0.7
  get_it: ^8.0.3
  uuid: ^4.5.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/message-samples.txt
